version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Deriv Quant — Synology NAS deployment
#
# INSTRUCTIONS
# ────────────
# 1. Replace  ghcr.io/YOUR_GITHUB_USERNAME/YOUR_REPO_NAME:latest
#    with the image name shown on your GitHub → Packages page.
#    Example:  ghcr.io/jsmith/deriv-quant:latest
#
# 2. In Container Manager → Project → Create
#    → paste this entire file into the YAML editor
#    → set environment variables (click the env panel):
#         Deriv_Api_Token   →  your token from app.deriv.com/account/api-token
#         PGPASSWORD        →  any strong password you choose
#    → click Deploy
#
# The database schema is created automatically on first start.
# Open  http://your-nas-ip  when done.
# ─────────────────────────────────────────────────────────────────────────────

services:

  db:
    image: postgres:16-alpine
    container_name: deriv-quant-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       deriv_quant
      POSTGRES_USER:     quantuser
      POSTGRES_PASSWORD: ${PGPASSWORD:?Set PGPASSWORD in the environment panel}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantuser -d deriv_quant"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    image: ghcr.io/YOUR_GITHUB_USERNAME/YOUR_REPO_NAME:latest   # ← replace this
    container_name: deriv-quant-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "80:80"
    environment:
      NODE_ENV:             production
      PORT:                 80
      DATABASE_URL:         postgresql://quantuser:${PGPASSWORD}@db:5432/deriv_quant
      Deriv_Api_Token:      ${Deriv_Api_Token:?Set Deriv_Api_Token in the environment panel}
      LIVE_TRADING_ENABLED: ${LIVE_TRADING_ENABLED:-false}
      SERVE_FRONTEND:       "true"

volumes:
  pgdata:
    driver: local
